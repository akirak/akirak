name: "Update flake.lock"

on:
  schedule:
    - cron: '0 4 * * 5'
  workflow_dispatch:
  workflow_call:
    secrets:
      github-token:
        description: GitHub token for actions that need repository API access
        required: true

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: cachix/install-nix-action@v31.10.5
        with:
          github_access_token: ${{ secrets.github-token }}
          extra_nix_config:
            flake-registry =  https://raw.githubusercontent.com/akirak/flake-pins/master/registry.json

      - name: Update flake.lock files
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r lockfile; do
            dir=$(dirname "$lockfile")
            echo "Updating $lockfile"
            (
              cd "$dir"
              nix flake update
            )
          done < <(find . -name flake.lock -type f | sort)

      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          commit-message: 'chore(nix): Update flake.lock'
          # Use a fine-grained personal access token that can trigger other
          # workflows
          token: ${{ secrets.github-token }}
          base: master
          title: 'Update flake.lock'
          branch: create-pull-request/update-flake-lock
          labels: automation,update
